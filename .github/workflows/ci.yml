name: ci

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: 'true'

jobs:
  build:
    name: build + test
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup .NET
        uses: actions/setup-dotnet@v5
        with:
          dotnet-version: '10.0.x'

      - name: Restore
        run: dotnet restore src/SHFramework.slnx

      - name: Build
        run: dotnet build src/SHFramework.slnx --configuration Release --no-restore

      - name: Test
        run: dotnet test src/SHFramework.slnx --configuration Release --no-build --verbosity normal
