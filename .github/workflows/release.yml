name: release

on:
  push:
    tags:
      - 'v*.*.*'

jobs:
  publish:
    name: pack + publish to NuGet
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0.x'

      - name: Restore
        run: dotnet restore src/SHFramework.slnx

      - name: Test
        run: dotnet test src/SHFramework.slnx --configuration Release

      - name: Pack template
        run: dotnet pack src/StrawhatsCompany.SHFramework.Templates.csproj --configuration Release --output ./artifacts

      - name: Push to NuGet
        env:
          NUGET_API_KEY: ${{ secrets.NUGET_API_KEY }}
        run: |
          if [ -z "$NUGET_API_KEY" ]; then
            echo "::error::NUGET_API_KEY secret is not set. Add it under repo Settings → Secrets → Actions so tag pushes publish to nuget.org."
            exit 1
          fi
          dotnet nuget push ./artifacts/*.nupkg \
            --api-key "$NUGET_API_KEY" \
            --source https://api.nuget.org/v3/index.json \
            --skip-duplicate
